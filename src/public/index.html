<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniCode | Advanced Sandbox</title>
    <meta name="description" content="A state-of-the-art code execution sandbox supporting Python and Node.js">
    <link rel="stylesheet" href="style.css">
    <!-- CodeMirror for beautiful code editing -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/theme/material-ocean.min.css">
    <!-- CodeMirror Addons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/scroll/simplescrollbars.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/python/python.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/javascript/javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/clike/clike.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/edit/closebrackets.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/edit/matchbrackets.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/addon/scroll/simplescrollbars.min.js"></script>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="ambient-bg">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
        <div class="grid-overlay"></div>
    </div>
    
    <div class="app-container">
        <header class="glass-panel slide-in-top">
            <div class="logo">
                <div class="logo-icon">
                    <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polygon points="12 2 2 7 12 12 22 7 12 2"></polygon>
                        <polyline points="2 17 12 22 22 17"></polyline>
                        <polyline points="2 12 12 17 22 12"></polyline>
                    </svg>
                </div>
                <div class="logo-text">
                    <h1>OmniCode<span>Sandbox</span><span class="badge">BETA</span></h1>
                </div>
            </div>
            <div class="controls">
                <div class="select-wrapper">
                    <select id="language-selector" aria-label="Select Language">
                        <option value="python">Python 3.11</option>
                        <option value="nodejs">Node.js 20</option>
                        <option value="c">C (GCC)</option>
                        <option value="cpp">C++ (G++)</option>
                        <option value="java">Java 21</option>
                    </select>
                    <svg class="select-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg>
                </div>
                <button id="run-btn" class="btn-primary" aria-label="Execute Code">
                    <svg class="run-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                    <span>Execute</span>
                </button>
            </div>
        </header>
        
        <main>
            <div class="pane glass-panel editor-wrapper slide-in-left">
                <div class="pane-header">
                    <div class="window-controls">
                        <span class="dot close"></span>
                        <span class="dot minimize"></span>
                        <span class="dot maximize"></span>
                    </div>
                    <div class="tab active">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                        main.code
                    </div>
                    <div class="spacer"></div>
                </div>
                <div class="editor-container">
                    <textarea id="code-editor" aria-label="Code Editor"></textarea>
                </div>
            </div>
            
            <div class="pane glass-panel terminal-wrapper slide-in-right">
                <div class="pane-header">
                    <div class="window-controls">
                        <span class="dot close"></span>
                        <span class="dot minimize"></span>
                        <span class="dot maximize"></span>
                    </div>
                    <div class="tab active">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 17 10 11 4 5"></polyline><line x1="12" y1="19" x2="20" y2="19"></line></svg>
                        Terminal Output
                    </div>
                    <div class="spacer"></div>
                    <span id="status-badge" class="status-badge idle">
                        <span class="status-dot"></span> <span id="status-text">Ready</span>
                    </span>
                </div>
                <div class="input-section" style="border-bottom: 1px solid var(--glass-border); padding: 1rem; background: rgba(0,0,0,0.2);">
                    <div style="font-size: 0.8rem; color: var(--text-muted); margin-bottom: 0.5rem; font-weight: 500; display: flex; align-items: center; gap: 0.4rem;">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 17l6-6-6-6M12 19h8"></path></svg>
                        Standard Input (stdin)
                    </div>
                    <textarea id="stdin-input" style="width: 100%; height: 60px; background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); border-radius: 8px; color: var(--text-main); font-family: 'JetBrains Mono', monospace; padding: 0.5rem; resize: vertical; outline: none;" placeholder="Enter input variables here..."></textarea>
                </div>
                <div class="terminal-container" id="terminal">
                    <div class="welcome-msg">
                        <span class="sys-time"></span> System initialized.<br>
                        <span class="sys-time"></span> Waiting for execution command...
                    </div>
                </div>
            </div>
        </main>
    </div>
    <div class="grain-overlay"></div>
    <script src="script.js"></script>
</body>
</html>
