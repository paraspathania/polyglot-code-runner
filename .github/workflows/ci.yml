name: CI / CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # ─────────────────────────────────────────────────────────────
  # Job 1 – Compile the TypeScript API source
  # ─────────────────────────────────────────────────────────────
  build-typescript:
    name: Build TypeScript
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/package-lock.json

      - name: Install dependencies
        working-directory: src
        run: npm ci

      - name: Compile TypeScript
        working-directory: src
        run: npm run build

  # ─────────────────────────────────────────────────────────────
  # Job 2 – Build every Docker image; push only on main/master
  # ─────────────────────────────────────────────────────────────
  build-and-push-images:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: build-typescript

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Short commit SHA used as an image tag alongside :latest
      - name: Compute short SHA
        id: meta
        run: echo "short_sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      # ── API ──────────────────────────────────────────────────
      - name: Build & push polyglot-api
        uses: docker/build-push-action@v5
        with:
          context: .
          file: containers/api/Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/polyglot-api:latest
            ${{ secrets.DOCKER_USERNAME }}/polyglot-api:${{ steps.meta.outputs.short_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Python runner ────────────────────────────────────────
      - name: Build & push polyglot-runner-python
        uses: docker/build-push-action@v5
        with:
          context: .
          file: containers/python/Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/polyglot-runner-python:latest
            ${{ secrets.DOCKER_USERNAME }}/polyglot-runner-python:${{ steps.meta.outputs.short_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Node.js runner ───────────────────────────────────────
      - name: Build & push polyglot-runner-nodejs
        uses: docker/build-push-action@v5
        with:
          context: .
          file: containers/nodejs/Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/polyglot-runner-nodejs:latest
            ${{ secrets.DOCKER_USERNAME }}/polyglot-runner-nodejs:${{ steps.meta.outputs.short_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── C runner ─────────────────────────────────────────────
      - name: Build & push polyglot-runner-c
        uses: docker/build-push-action@v5
        with:
          context: .
          file: containers/c/Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/polyglot-runner-c:latest
            ${{ secrets.DOCKER_USERNAME }}/polyglot-runner-c:${{ steps.meta.outputs.short_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── C++ runner ───────────────────────────────────────────
      - name: Build & push polyglot-runner-cpp
        uses: docker/build-push-action@v5
        with:
          context: .
          file: containers/cpp/Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/polyglot-runner-cpp:latest
            ${{ secrets.DOCKER_USERNAME }}/polyglot-runner-cpp:${{ steps.meta.outputs.short_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Java runner ──────────────────────────────────────────
      - name: Build & push polyglot-runner-java
        uses: docker/build-push-action@v5
        with:
          context: .
          file: containers/java/Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/polyglot-runner-java:latest
            ${{ secrets.DOCKER_USERNAME }}/polyglot-runner-java:${{ steps.meta.outputs.short_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
